name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run format:check

  web-lint:
    name: Web lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - working-directory: apps/web
        run: npm ci
      - run: npm run lint:web

  web-typecheck:
    name: Web typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - working-directory: apps/web
        run: npm ci
      - run: npm run typecheck:web

  web-test:
    name: Web test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - working-directory: apps/web
        run: npm ci
      - run: npm run test:web

  api-lint:
    name: API lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          working-directory: apps/api
      - run: npm ci
      - run: npm run sync:api
      - run: npm run lint:api:check

  api-typecheck:
    name: API typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          working-directory: apps/api
      - run: npm ci
      - run: npm run sync:api
      - run: npm run typecheck:api

  api-test:
    name: API test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          working-directory: apps/api
      - run: npm ci
      - run: npm run sync:api
      - run: npm run test:api

  web-build:
    name: Web build
    needs: [format, web-lint, web-typecheck, web-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - working-directory: apps/web
        run: npm ci
      - working-directory: apps/web
        env:
          APP_ENV: production
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key
          DB_PASSWORD: ci-build-placeholder
        run: npm run build

  ci-complete:
    name: CI complete
    needs:
      - format
      - web-lint
      - web-typecheck
      - web-test
      - web-build
      - api-lint
      - api-typecheck
      - api-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all CI jobs passed
        run: |
          if [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.web-lint.result }}" != "success" ] || \
             [ "${{ needs.web-typecheck.result }}" != "success" ] || \
             [ "${{ needs.web-test.result }}" != "success" ] || \
             [ "${{ needs.web-build.result }}" != "success" ] || \
             [ "${{ needs.api-lint.result }}" != "success" ] || \
             [ "${{ needs.api-typecheck.result }}" != "success" ] || \
             [ "${{ needs.api-test.result }}" != "success" ]; then
            echo "One or more CI jobs did not succeed."
            exit 1
          fi
          echo "All CI checks passed."
